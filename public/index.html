<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Manager</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      .cassette-icon {
        height: 2.31rem;
        width: 3.47rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
        background: #adb5bd;
        border: 1px solid #6c757d;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
      }
      .cassette-icon > svg {
        width: calc(100% - 0.16rem);
        height: calc(100% - 0.16rem);
        display: block;
      }
      .cassette-reel {
        transform-box: fill-box;
        transform-origin: center;
      }
      .cassette-icon.is-playing .cassette-reel {
        animation: cassette-reel-spin 3s linear infinite;
      }
      .audio-spectrum {
        width: 3.2rem;
        height: 1.6rem;
        display: block;
      }
      .spectrum-brick {
        opacity: 0;
      }
      .spectrum-brick.on {
        opacity: 1;
      }
      .audio-timing-pill {
        min-width: 14rem;
        min-height: 2.5rem;
        padding: 0.15rem 0.7rem;
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        background: #2b3035;
        border: 1px solid #495057;
        border-radius: 0;
      }
      .audio-timeline {
        width: 100%;
        height: 0.28rem;
        margin-top: 0.2rem;
        background: #495057;
        border-radius: 999px;
        overflow: hidden;
        cursor: pointer;
      }
      .audio-timeline-progress {
        height: 100%;
        width: 0;
        background: #adb5bd;
        transition: width 80ms linear;
      }
      .audio-track-subtitle {
        max-width: 16rem;
        font-size: 0.68rem;
        line-height: 1.05;
        color: #adb5bd;
      }
      @keyframes cassette-reel-spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body class="bg-body">
    <main id="appMain" class="container-fluid p-0 min-vh-100">
      <div class="row g-0 min-vh-100">
        <aside class="d-none d-lg-block col-lg-3 col-xl-2">
          <div class="card shadow-sm h-100 rounded-0">
            <div class="card-body p-3 d-flex flex-column gap-3">
              <section class="d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-2">
                  <span
                    id="userAvatar"
                    class="d-inline-flex align-items-center justify-content-center rounded-circle border border-secondary-subtle bg-primary-subtle text-primary-emphasis fw-semibold"
                    aria-label="Current user"
                    title="Current user"
                    style="width: 2rem; height: 2rem;"
                  >
                    <i class="bi bi-person-fill"></i>
                  </span>
                  <span id="userName" class="small text-body-secondary"></span>
                </div>
                <button
                  id="logoutButton"
                  type="button"
                  class="btn btn-outline-secondary btn-sm"
                  title="Logout"
                  aria-label="Logout"
                >
                  <i class="bi bi-box-arrow-right"></i>
                </button>
              </section>

              <nav>
                <div class="small text-body-secondary mb-2">Folders</div>
                <div id="sidebarNav" class="list-group list-group-flush"></div>
              </nav>
            </div>
          </div>
        </aside>

        <section class="col-12 col-lg-9 col-xl-10">
          <div class="h-100">
            <div class="p-3">
              <section class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
                <div class="d-flex align-items-center gap-2">
                  <button
                    type="button"
                    class="btn btn-outline-secondary btn-sm d-lg-none"
                    data-bs-toggle="collapse"
                    data-bs-target="#mobileMenuPanel"
                    aria-controls="mobileMenuPanel"
                    aria-expanded="false"
                    aria-label="Toggle navigation"
                    title="Toggle navigation"
                  >
                    <i class="bi bi-list"></i>
                  </button>
                  <div id="currentPath" class="d-none d-md-flex flex-wrap align-items-center gap-1"></div>
                </div>
                <div class="d-flex gap-2 align-items-center ms-auto">
                  <form id="createDirForm" class="d-none d-md-flex">
                    <input
                      id="directoryName"
                      name="directoryName"
                      class="form-control form-control-sm"
                      placeholder="Folder"
                      required
                    />
                    <button
                      type="submit"
                      class="btn btn-primary btn-sm ms-2"
                      title="Create folder"
                      aria-label="Create folder"
                    >
                      <i class="bi bi-folder-plus"></i>
                    </button>
                  </form>

                  <form id="uploadForm" class="d-flex gap-2">
                    <input id="fileInput" type="file" name="files" class="d-none" multiple />
                    <label
                      for="fileInput"
                      class="btn btn-outline-primary btn-sm"
                      title="Choose files"
                      aria-label="Choose files"
                    >
                      <i class="bi bi-paperclip"></i>
                    </label>
                    <button type="submit" class="btn btn-success btn-sm" title="Upload" aria-label="Upload files">
                      <i class="bi bi-upload"></i>
                    </button>
                  </form>
                </div>
              </section>

              <section id="mobileMenuPanel" class="collapse d-lg-none mb-3">
                <div class="card shadow-sm rounded-0">
                  <div class="card-body p-3 d-flex flex-column gap-3">
                    <section class="d-flex align-items-center justify-content-between">
                      <div class="d-flex align-items-center gap-2">
                        <span
                          id="mobileUserAvatar"
                          class="d-inline-flex align-items-center justify-content-center rounded-circle border border-secondary-subtle bg-primary-subtle text-primary-emphasis fw-semibold"
                          aria-label="Current user"
                          title="Current user"
                          style="width: 2rem; height: 2rem;"
                        >
                          <i class="bi bi-person-fill"></i>
                        </span>
                        <span id="mobileUserName" class="small text-body-secondary"></span>
                      </div>
                      <button
                        id="mobileLogoutButton"
                        type="button"
                        class="btn btn-outline-secondary btn-sm"
                        title="Logout"
                        aria-label="Logout"
                      >
                        <i class="bi bi-box-arrow-right"></i>
                      </button>
                    </section>

                    <nav>
                      <div class="small text-body-secondary mb-2">Folders</div>
                      <div id="mobileSidebarNav" class="list-group list-group-flush"></div>
                    </nav>
                  </div>
                </div>
              </section>

              <p id="status" class="small text-body-secondary mb-3" aria-live="polite"></p>

              <section class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                  <thead class="table-dark">
                    <tr>
                      <th>Name</th>
                      <th>Type</th>
                      <th>Size</th>
                      <th>Modified</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody id="fileList"></tbody>
                </table>
              </section>
            </div>
          </div>
        </section>
      </div>
    </main>

    <div
      class="modal fade"
      id="imagePreviewModal"
      tabindex="-1"
      aria-labelledby="imagePreviewLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title fs-5" id="imagePreviewLabel">Image Preview</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-center">
            <img
              id="imagePreview"
              src=""
              alt="Preview"
              class="img-fluid rounded border"
              style="max-height: 70vh"
            />
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="videoPreviewModal"
      tabindex="-1"
      aria-labelledby="videoPreviewLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title fs-5 text-truncate" id="videoPreviewLabel">Video Preview</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <video id="videoPreview" class="w-100 rounded border" controls preload="metadata"></video>
          </div>
        </div>
      </div>
    </div>

    <section id="audioDock" class="position-fixed bottom-0 start-0 end-0 bg-body border-top shadow-sm p-2 d-none" style="z-index: 1040;">
      <div class="container-fluid d-flex align-items-center gap-2 position-relative">
        <button id="audioRewindButton" type="button" class="btn btn-outline-secondary btn-sm rounded-0" style="width: 2.1rem; height: 2.1rem;" title="Previous track" aria-label="Previous track">
          <i class="bi bi-rewind-fill"></i>
        </button>
        <button id="audioPlayButton" type="button" class="btn btn-outline-secondary btn-sm rounded-0" style="width: 2.1rem; height: 2.1rem;" title="Play" aria-label="Play">
          <i class="bi bi-play-fill"></i>
        </button>
        <button id="audioPauseButton" type="button" class="btn btn-outline-secondary btn-sm rounded-0" style="width: 2.1rem; height: 2.1rem;" title="Pause" aria-label="Pause">
          <i class="bi bi-pause-fill"></i>
        </button>
        <button id="audioStopButton" type="button" class="btn btn-outline-secondary btn-sm rounded-0" style="width: 2.1rem; height: 2.1rem;" title="Stop" aria-label="Stop">
          <i class="bi bi-stop-fill"></i>
        </button>
        <button id="audioForwardButton" type="button" class="btn btn-outline-secondary btn-sm rounded-0" style="width: 2.1rem; height: 2.1rem;" title="Next track" aria-label="Next track">
          <i class="bi bi-fast-forward-fill"></i>
        </button>
        <button id="audioModeButton" type="button" class="btn btn-outline-secondary btn-sm rounded-0" style="width: 2.1rem; height: 2.1rem;" title="Play mode: loop" aria-label="Play mode: loop">
          <i class="bi bi-arrow-repeat" aria-hidden="true"></i>
        </button>
        <div class="audio-timing-pill position-absolute top-50 start-50 translate-middle">
          <span id="audioTiming" class="small text-body-secondary text-nowrap">0:00 / -0:00</span>
          <span id="audioNowPlaying" class="audio-track-subtitle text-truncate">No track selected</span>
          <div id="audioTimeline" class="audio-timeline" aria-label="Audio timeline">
            <div id="audioTimelineProgress" class="audio-timeline-progress"></div>
          </div>
        </div>
        <svg id="audioSpectrum" class="audio-spectrum ms-auto" viewBox="0 0 56 28" role="img" aria-label="Audio analyzer"></svg>
        <div id="audioCassette" class="cassette-icon" role="img" aria-label="Cassette"></div>
        <audio id="audioPlayer" class="d-none" preload="metadata" aria-hidden="true"></audio>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
