<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Manager</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="bg-body-tertiary">
    <main class="container py-4 py-md-5">
      <h1 class="h3 mb-4">File Manager</h1>
      <div class="card shadow-sm">
        <div class="card-body p-3 p-md-4">
          
          <section class="d-flex flex-wrap gap-2 align-items-center mb-3">
            <button id="upButton" type="button" class="btn btn-outline-secondary btn-sm">Up</button>
            <span id="currentPath" class="badge text-bg-light border fw-normal fs-6">/</span>
          </section>

          <section class="row g-2 g-md-3 mb-3">
            <div class="col-12 col-md-6">
              <form id="createDirForm" class="input-group">
                <input
                  id="directoryName"
                  name="directoryName"
                  class="form-control"
                  placeholder="New folder name"
                  required
                />
                <button type="submit" class="btn btn-primary">Create Folder</button>
              </form>
            </div>

            <div class="col-12 col-md-6">
              <form id="uploadForm" class="input-group">
                <input id="fileInput" type="file" name="files" class="form-control" multiple required />
                <button type="submit" class="btn btn-success">Upload</button>
              </form>
            </div>
          </section>

          <p id="status" class="small text-body-secondary mb-3" aria-live="polite"></p>

          <section class="table-responsive">
            <table class="table table-striped table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Name</th>
                  <th>Type</th>
                  <th>Size</th>
                  <th>Modified</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="fileList"></tbody>
            </table>
          </section>
        </div>
      </div>
    </main>

    <div
      class="modal fade"
      id="imagePreviewModal"
      tabindex="-1"
      aria-labelledby="imagePreviewLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title fs-5" id="imagePreviewLabel">Image Preview</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-center">
            <img
              id="imagePreview"
              src=""
              alt="Preview"
              class="img-fluid rounded border"
              style="max-height: 70vh"
            />
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="audioPlayerModal"
      tabindex="-1"
      aria-labelledby="audioPlayerLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title fs-5 text-truncate" id="audioPlayerLabel">Now Playing</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <audio id="audioPlayer" class="w-100" controls preload="metadata"></audio>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="videoPreviewModal"
      tabindex="-1"
      aria-labelledby="videoPreviewLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title fs-5 text-truncate" id="videoPreviewLabel">Video Preview</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <video id="videoPreview" class="w-100 rounded border" controls preload="metadata"></video>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
