<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Manager</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="bg-body-tertiary">
    <main class="container-fluid p-0 min-vh-100">
      <div class="row g-0 min-vh-100">
        <aside class="col-12 col-lg-3 col-xl-2">
          <div class="card shadow-sm h-100 rounded-0">
            <div class="card-body p-3 d-flex flex-column gap-3">
              <section class="d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-2">
                  <span
                    id="userAvatar"
                    class="d-inline-flex align-items-center justify-content-center rounded-circle border border-secondary-subtle bg-primary-subtle text-primary-emphasis fw-semibold"
                    aria-label="Current user"
                    title="Current user"
                    style="width: 2rem; height: 2rem;"
                  >
                    <i class="bi bi-person-fill"></i>
                  </span>
                  <span id="userName" class="small text-body-secondary"></span>
                </div>
                <button
                  id="logoutButton"
                  type="button"
                  class="btn btn-outline-secondary btn-sm"
                  title="Logout"
                  aria-label="Logout"
                >
                  <i class="bi bi-box-arrow-right"></i>
                </button>
              </section>

              <nav>
                <div class="small text-body-secondary mb-2">Folders</div>
                <div id="sidebarNav" class="list-group list-group-flush"></div>
              </nav>
            </div>
          </div>
        </aside>

        <section class="col-12 col-lg-9 col-xl-10">
          <div class="h-100">
            <div class="p-3 p-md-4">
              <section class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
                <div id="currentPath" class="d-flex flex-wrap align-items-center gap-1"></div>
                <div class="d-flex gap-2 align-items-center ms-auto">
                  <form id="createDirForm" class="d-flex">
                    <input
                      id="directoryName"
                      name="directoryName"
                      class="form-control form-control-sm"
                      placeholder="Folder"
                      required
                    />
                    <button
                      type="submit"
                      class="btn btn-primary btn-sm ms-2"
                      title="Create folder"
                      aria-label="Create folder"
                    >
                      <i class="bi bi-folder-plus"></i>
                    </button>
                  </form>

                  <form id="uploadForm" class="d-flex gap-2">
                    <input id="fileInput" type="file" name="files" class="d-none" multiple />
                    <label
                      for="fileInput"
                      class="btn btn-outline-primary btn-sm"
                      title="Choose files"
                      aria-label="Choose files"
                    >
                      <i class="bi bi-paperclip"></i>
                    </label>
                    <button type="submit" class="btn btn-success btn-sm" title="Upload" aria-label="Upload files">
                      <i class="bi bi-upload"></i>
                    </button>
                  </form>
                </div>
              </section>

              <p id="status" class="small text-body-secondary mb-3" aria-live="polite"></p>

              <section class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                  <thead class="table-light">
                    <tr>
                      <th>Name</th>
                      <th>Type</th>
                      <th>Size</th>
                      <th>Modified</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody id="fileList"></tbody>
                </table>
              </section>
            </div>
          </div>
        </section>
      </div>
    </main>

    <div
      class="modal fade"
      id="imagePreviewModal"
      tabindex="-1"
      aria-labelledby="imagePreviewLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title fs-5" id="imagePreviewLabel">Image Preview</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-center">
            <img
              id="imagePreview"
              src=""
              alt="Preview"
              class="img-fluid rounded border"
              style="max-height: 70vh"
            />
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="audioPlayerModal"
      tabindex="-1"
      aria-labelledby="audioPlayerLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title fs-5 text-truncate" id="audioPlayerLabel">Now Playing</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <audio id="audioPlayer" class="w-100" controls preload="metadata"></audio>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="videoPreviewModal"
      tabindex="-1"
      aria-labelledby="videoPreviewLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title fs-5 text-truncate" id="videoPreviewLabel">Video Preview</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <video id="videoPreview" class="w-100 rounded border" controls preload="metadata"></video>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
