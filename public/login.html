<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-body-tertiary d-flex align-items-center min-vh-100">
    <main class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h1 class="h4 mb-3">Sign In</h1>
              <form id="loginForm" class="d-grid gap-3">
                <div>
                  <label for="username" class="form-label">Username</label>
                  <input id="username" name="username" class="form-control" required autocomplete="username" />
                </div>
                <div>
                  <label for="password" class="form-label">Password</label>
                  <input
                    id="password"
                    name="password"
                    type="password"
                    class="form-control"
                    required
                    autocomplete="current-password"
                  />
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <p id="status" class="small text-danger mb-0" aria-live="polite"></p>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="/login.js"></script>
  </body>
</html>
